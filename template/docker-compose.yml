services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "5432:5432"          
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API AdonisJS
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      NODE_ENV: development
      PORT: 3333
      HOST: 0.0.0.0
      DB_HOST: postgres        # Nom du service Docker, pas localhost
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
    ports:
      - "3333:3333"
    volumes:
      - ./apps/api:/app        
      - /app/node_modules    
    depends_on:
      postgres:
        condition: service_healthy 
    command: node ace serve --hmr
  # Frontend React/Vite
  client:
    build:
      context: ./apps/client
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3333 
    ports:
      - "5173:5173"
    volumes:
      - ./apps/client:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data: